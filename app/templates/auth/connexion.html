<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - Gestion de Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6f8; height: 100vh; display: flex; align-items: center; }
        .carte-connexion { max-width: 420px; margin: 0 auto; box-shadow: 0 1px 8px rgba(0,0,0,.1); border: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="card carte-connexion p-4">
        <h4 class="mb-3 text-center">Gestion de Stock</h4>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for categorie, message in messages %}
                    <div class="alert alert-{{ categorie }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="mot_de_passe" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
    </div>
</div>
</body>
</html>
